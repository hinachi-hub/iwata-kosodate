<style>
  :root {
    --green-dark: #2A5C2A;
    --green-mid: #4A8C4A;
    --green-light: #EAF3DE;
    --green-pale: #F4FAF0;
    --blue-dark: #185FA5;
    --blue-light: #E6F1FB;
    --gray: #888780;
    --gray-light: #F1EFE8;
    --orange: #D97706;
    --orange-light: #FAEEDA;
    --red-light: #FAECE7;
    --red-dark: #4A1B0C;
    --text: #1A1A18;
    --text-sub: #6B6B67;
    --border: #E0DDD6;
    --bg: #FAFAF7;
    --card-bg: #FFFFFF;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    background: var(--green-dark);
    color: white;
    padding: 20px 24px 16px;
  }
  header h1 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.02em;
    margin-bottom: 4px;
  }
  header p {
    font-size: 12px;
    opacity: 0.75;
  }
  .main { max-width: 860px; margin: 0 auto; padding: 24px 16px 60px; }

  .date-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    background: white;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .date-bar label {
    font-size: 14px;
    color: var(--text-sub);
    white-space: nowrap;
    font-weight: 500;
  }
  .date-bar input[type=date] {
    flex: 1;
    min-width: 160px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    outline: none;
    background: var(--bg);
  }
  .date-bar input[type=date]:focus {
    border-color: var(--green-mid);
  }

  .summary-row {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .sum-card {
    flex: 1;
    min-width: 90px;
    background: white;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 12px;
    text-align: center;
  }
  .sum-num { font-size: 28px; font-weight: 700; }
  .sum-lbl { font-size: 12px; color: var(--text-sub); margin-top: 2px; }
  .num-event { color: var(--green-dark); }
  .num-open  { color: var(--blue-dark); }
  .num-closed{ color: var(--gray); }

  .section { margin-bottom: 24px; }
  .section-head {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 700;
    color: var(--text-sub);
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .section-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot-event { background: var(--green-dark); }
  .dot-open  { background: var(--blue-dark); }
  .dot-closed{ background: var(--gray); }

  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 10px;
  }
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .card-top { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 999px;
    letter-spacing: 0.04em;
    flex-shrink: 0;
  }
  .badge-event { background: var(--green-light); color: var(--green-dark); }
  .badge-open  { background: var(--blue-light);  color: var(--blue-dark); }
  .badge-closed{ background: var(--gray-light);  color: var(--gray); }
  .card-name { font-size: 15px; font-weight: 700; color: var(--text); }
  .card-location { font-size: 11px; color: var(--text-sub); margin-bottom: 10px; }

  .event-list { display: flex; flex-direction: column; gap: 8px; }
  .event-item {}
  .event-name-row { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; margin-bottom: 2px; }
  .event-name { font-size: 13px; font-weight: 500; color: var(--text); }
  .tag {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 999px;
    white-space: nowrap;
  }
  .tag-reserve { background: var(--orange-light); color: var(--orange); }
  .tag-warn    { background: var(--red-light);    color: var(--red-dark); }
  .event-detail { font-size: 12px; color: var(--text-sub); line-height: 1.5; }

  .daily-box {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px dashed var(--border);
  }
  .daily-label {
    font-size: 11px;
    color: var(--text-sub);
    font-weight: 500;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .daily-label::before {
    content: "↻";
    font-size: 12px;
    color: var(--green-mid);
  }
  .daily-name { font-size: 12px; font-weight: 500; color: var(--text); }
  .daily-detail { font-size: 11px; color: var(--text-sub); line-height: 1.5; }

  .pdf-link {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--blue-dark);
    text-decoration: none;
    margin-top: 10px;
    padding: 4px 8px;
    border: 1px solid var(--blue-light);
    border-radius: 6px;
    background: var(--blue-light);
    width: fit-content;
    transition: opacity 0.15s;
  }
  .pdf-link:hover { opacity: 0.75; }

  .holiday-note {
    background: #FFF8E6;
    border: 1px solid #F0D080;
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 13px;
    color: #7A5C00;
    margin-bottom: 16px;
  }

  .footer-note {
    font-size: 11px;
    color: var(--text-sub);
    margin-top: 24px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    line-height: 1.7;
  }

  /* タブ */
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 20px;
    background: white;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 6px;
  }
  .tab-btn {
    flex: 1;
    padding: 10px 8px;
    border: none;
    border-radius: 8px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    background: transparent;
    color: var(--text-sub);
    transition: background 0.15s, color 0.15s;
  }
  .tab-btn.active {
    background: var(--green-dark);
    color: white;
  }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* 要予約一覧テーブル */
  .reserve-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    background: white;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .reserve-table th {
    background: var(--green-dark);
    color: white;
    text-align: left;
    padding: 10px 14px;
    font-weight: 500;
    font-size: 12px;
    white-space: nowrap;
  }
  .reserve-table td {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
    line-height: 1.5;
  }
  .reserve-table tr:last-child td { border-bottom: none; }
  .reserve-table tr:hover td { background: var(--green-pale); }
  .td-date { white-space: nowrap; color: var(--text-sub); font-size: 12px; }
  .td-center { white-space: nowrap; font-weight: 500; }
  .td-event { color: var(--text); }
  .td-detail { color: var(--text-sub); font-size: 12px; }
  .reserve-filter {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    flex-wrap: wrap;
    align-items: center;
  }
  .reserve-filter label { font-size: 13px; color: var(--text-sub); }
  .reserve-filter select {
    font-family: inherit;
    font-size: 13px;
    padding: 6px 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: white;
    color: var(--text);
    outline: none;
  }
  .reserve-filter select:focus { border-color: var(--green-mid); }
  .reserve-count { font-size: 12px; color: var(--text-sub); margin-left: auto; }

  @media (max-width: 480px) {
    header h1 { font-size: 16px; }
    .cards { grid-template-columns: 1fr; }
    .sum-num { font-size: 22px; }
    .reserve-table th, .reserve-table td { padding: 8px 10px; }
    .tab-btn { font-size: 12px; padding: 8px 4px; }
  }
</style>
</head>

const HOLIDAYS = ["2026-05-03","2026-05-04","2026-05-05","2026-05-06"];
const DAY_LABELS = ["日","月","火","水","木","金","土"];

function isOpen(c, dateStr) {
  if (c.closedDates && c.closedDates.includes(dateStr)) return false;
  return c.openDays.includes(new Date(dateStr).getDay());
}
function getEvents(c, dateStr) { return (c.events && c.events[dateStr]) || []; }

function renderEventHtml(events) {
  return `<div class="event-list">${events.map(e => {
    const detail = [e.time, e.note].filter(Boolean).join(" ・ ");
    return `<div class="event-item">
      <div class="event-name-row">
        <span class="event-name">${e.name}</span>
        ${e.reserve ? `<span class="tag tag-reserve">要予約</span>` : ""}
        ${e.warn    ? `<span class="tag tag-warn">注意</span>` : ""}
      </div>
      ${detail ? `<div class="event-detail">${detail}</div>` : ""}
    </div>`;
  }).join("")}</div>`;
}

function renderDailyHtml(daily) {
  if (!daily || !daily.length) return "";
  const items = daily.map(d => {
    const detail = [d.time, d.note].filter(Boolean).join(" ・ ");
    return `<div>
      <div class="daily-name">${d.name}</div>
      ${detail ? `<div class="daily-detail">${detail}</div>` : ""}
    </div>`;
  }).join("");
  return `<div class="daily-box">
    <div class="daily-label">毎日のプログラム</div>
    ${items}
  </div>`;
}

function renderPdfLink(pdf) {
  if (!pdf) return "";
  return `<a class="pdf-link" href="${pdf}" target="_blank" rel="noopener">📄 5月号おたより（PDF）</a>`;
}

function render() {
  const dateStr = document.getElementById("pick").value;
  const out = document.getElementById("out");
  if (!dateStr) { out.innerHTML = ""; return; }

  const dow = new Date(dateStr).getDay();
  const isHol = HOLIDAYS.includes(dateStr) || dow === 0;
  const withEvents = [], openOnly = [], closed = [];

  for (const c of CENTERS) {
    const open = isOpen(c, dateStr) && !isHol;
    const events = getEvents(c, dateStr);
    if (!open) closed.push(c);
    else if (events.length) withEvents.push({c, events});
    else openOnly.push(c);
  }

  const [y,m,d] = dateStr.split("-");
  const parts = [];
  parts.push(`<p style="font-size:16px;font-weight:700;color:var(--text);margin-bottom:16px">${parseInt(y)}年${parseInt(m)}月${parseInt(d)}日（${DAY_LABELS[dow]}）</p>`);

  if (isHol) parts.push(`<div class="holiday-note">🎌 この日は祝日のため、ほぼすべてのセンターが休館です。</div>`);

  parts.push(`<div class="summary-row">
    <div class="sum-card"><div class="sum-num num-event">${withEvents.length}</div><div class="sum-lbl">イベントあり</div></div>
    <div class="sum-card"><div class="sum-num num-open">${openOnly.length}</div><div class="sum-lbl">通常開館</div></div>
    <div class="sum-card"><div class="sum-num num-closed">${closed.length}</div><div class="sum-lbl">休館</div></div>
  </div>`);

  if (withEvents.length) {
    parts.push(`<div class="section">
      <div class="section-head"><span class="section-dot dot-event"></span>イベントあり</div>
      <div class="cards">`);
    for (const {c, events} of withEvents) {
      parts.push(`<div class="card">
        <div class="card-top"><span class="badge badge-event">イベント</span><span class="card-name">${c.name}</span></div>
        <div class="card-location">${c.location}</div>
        ${renderEventHtml(events)}
        ${renderDailyHtml(c.daily)}
        ${renderPdfLink(c.pdf)}
      </div>`);
    }
    parts.push(`</div></div>`);
  }

  if (openOnly.length) {
    parts.push(`<div class="section">
      <div class="section-head"><span class="section-dot dot-open"></span>通常開館（特別イベントなし）</div>
      <div class="cards">`);
    for (const c of openOnly) {
      parts.push(`<div class="card">
        <div class="card-top"><span class="badge badge-open">開館</span><span class="card-name">${c.name}</span></div>
        <div class="card-location">${c.location}</div>
        ${renderDailyHtml(c.daily)}
        ${renderPdfLink(c.pdf)}
      </div>`);
    }
    parts.push(`</div></div>`);
  }

  if (closed.length) {
    parts.push(`<div class="section">
      <div class="section-head"><span class="section-dot dot-closed"></span>休館</div>
      <div class="cards">`);
    for (const c of closed) {
      parts.push(`<div class="card">
        <div class="card-top"><span class="badge badge-closed">休館</span><span class="card-name">${c.name}</span></div>
        <div class="card-location">${c.location}</div>
        ${renderPdfLink(c.pdf)}
      </div>`);
    }
    parts.push(`</div></div>`);
  }

  parts.push(`<div class="footer-note">
    ※ 天候・行事等により変更・中止の場合があります。各センターに直接ご確認ください。<br>
    ※ データは2026年5月号おたよりに基づきます。
  </div>`);

  out.innerHTML = parts.join("");
}

// ── タブ切り替え ──
function switchTab(name) {
  document.querySelectorAll(".tab-btn").forEach((b,i) => {
    b.classList.toggle("active", ["calendar","reserve"][i] === name);
  });
  document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
  document.getElementById("tab-"+name).classList.add("active");
}

// ── 要予約イベント一覧 ──
// 全センターのイベントから reserve:true のものをフラットに展開
function buildReserveList() {
  const list = [];
  for (const c of CENTERS) {
    if (!c.events) continue;
    for (const [dateStr, events] of Object.entries(c.events)) {
      for (const e of events) {
        if (e.reserve && e.name !== "はじめのいっぽ" && e.name !== "はじめのいっぽ（貸し切り）") {
          list.push({ dateStr, center: c, event: e });
        }
      }
    }
  }
  // 日付順にソート
  list.sort((a,b) => a.dateStr.localeCompare(b.dateStr));
  return list;
}

const RESERVE_LIST = buildReserveList();

// センター絞り込みプルダウンを生成
function initReserveFilter() {
  const sel = document.getElementById("filter-center");
  const names = [...new Set(RESERVE_LIST.map(r => r.center.name))];
  names.forEach(name => {
    const opt = document.createElement("option");
    opt.value = name;
    opt.textContent = name;
    sel.appendChild(opt);
  });
}

function renderReserve() {
  const filterCenter = document.getElementById("filter-center").value;
  const filtered = filterCenter
    ? RESERVE_LIST.filter(r => r.center.name === filterCenter)
    : RESERVE_LIST;

  document.getElementById("reserve-count").textContent = filtered.length + " 件";

  if (!filtered.length) {
    document.getElementById("reserve-out").innerHTML =
      `<p style="font-size:14px;color:var(--text-sub);padding:16px 0">該当するイベントがありません。</p>`;
    return;
  }

  const rows = filtered.map(r => {
    const [y,m,d] = r.dateStr.split("-");
    const dow = DAY_LABELS[new Date(r.dateStr).getDay()];
    const detail = [r.event.time, r.event.note].filter(Boolean).join(" ・ ");
    const wTag = r.event.warn ? `<span class="tag tag-warn" style="font-size:10px;padding:1px 6px;border-radius:999px;background:var(--red-light);color:var(--red-dark)">注意</span> ` : "";
    return `<tr>
      <td class="td-date">${parseInt(m)}/${parseInt(d)}（${dow}）</td>
      <td class="td-center">${r.center.name}</td>
      <td class="td-event">${wTag}${r.event.name}</td>
      <td class="td-detail">${detail}</td>
    </tr>`;
  }).join("");

  document.getElementById("reserve-out").innerHTML = `
    <div style="overflow-x:auto">
      <table class="reserve-table">
        <thead>
          <tr>
            <th>日付</th>
            <th>センター</th>
            <th>イベント名</th>
            <th>時間・備考</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <div class="footer-note" style="margin-top:16px">
      ※ 天候等により変更・中止の場合があります。各センターにご確認ください。<br>
      ※ 5月のデータはおたより、6月のデータは広報いわた（2026年5月号）に基づきます。
    </div>`;
}

// ── 初期化 ──
const todayLocal = new Date();
const pad = n => String(n).padStart(2,"0");
const todayStr = todayLocal.getFullYear()+"-"+pad(todayLocal.getMonth()+1)+"-"+pad(todayLocal.getDate());
const minDate = "2026-05-01";
const maxDate = "2026-06-30";
const clampedDate = todayStr < minDate ? minDate : todayStr > maxDate ? maxDate : todayStr;
document.getElementById("pick").value = clampedDate;

document.getElementById("pick").addEventListener("change", render);
render();
initReserveFilter();
renderReserve();
</script>
